<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notebook — A quiet place to write</title>
    <meta name="description" content="A cozy, retro notebook journal app for daily writing, dreams, and ideas." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:wght@400;500&family=Caveat:wght@500;700&family=Kalam:wght@400;700&family=Patrick+Hand&family=Indie+Flower&family=Shadows+Into+Light&family=Homemade+Apple&family=Architects+Daughter&family=Gloria+Hallelujah&family=Reenie+Beanie&family=Courier+Prime:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" />
    <script>
      try{
        var t = localStorage.getItem('journal.settings.v1');
        if(t){
          var s = JSON.parse(t);
          if(s.theme) document.documentElement.setAttribute('data-theme',s.theme);
        }
      }catch(e){}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
